name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            pkg_target: node18-linux-x64
            binary: dvx
          - os: windows-latest
            target: win-x64
            pkg_target: node18-win-x64
            binary: dvx.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: '18', cache: 'pnpm' }
      - run: pnpm install
      - run: pnpm build
      - name: Build binary
        shell: bash
        run: |
          npx @yao-pkg/pkg dist/index.js \
            --target ${{ matrix.pkg_target }} \
            --output dvx \
            --public-packages '*'
      - name: Package with native addon
        shell: bash
        run: |
          ADDON=$(find node_modules -path '*/better-sqlite3/build/Release/better_sqlite3.node' | head -1)
          cp "$ADDON" better_sqlite3.node
          if command -v zip >/dev/null 2>&1; then
            zip dvx-${{ matrix.target }}.zip ${{ matrix.binary }} better_sqlite3.node
          else
            7z a dvx-${{ matrix.target }}.zip ${{ matrix.binary }} better_sqlite3.node
          fi
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum dvx-${{ matrix.target }}.zip | cut -d' ' -f1 > dvx-${{ matrix.target }}.zip.sha256
          else
            shasum -a 256 dvx-${{ matrix.target }}.zip | cut -d' ' -f1 > dvx-${{ matrix.target }}.zip.sha256
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dvx-${{ matrix.target }}.zip
            dvx-${{ matrix.target }}.zip.sha256

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install
      - run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

