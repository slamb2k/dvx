name: Build & Deploy

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ${{ vars.ACR_LOGIN_SERVER }}
  IMAGE_NAME: dvx

permissions:
  contents: read

jobs:
  # ── Build & Test (runs on PRs and pushes, no Azure creds needed) ──
  build:
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v4

      - name: Set variables
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build and test
        uses: docker/build-push-action@v6
        with:
          context: .
          target: test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Push image to ACR (only on push to main) ─────────────────
  push:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ vars.ACR_NAME }}

      - uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Dev ─────────────────────────────────────────────
  deploy-dev:
    needs: [build, push]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Container Apps (dev)
        uses: azure/container-apps-deploy-action@v2
        with:
          imageToDeploy: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.sha_short }}
          containerAppName: ca-dvx-dev
          resourceGroup: ${{ vars.DEV_RESOURCE_GROUP }}

      - name: Smoke test
        run: |
          APP_URL=$(az containerapp show \
            --name ca-dvx-dev \
            --resource-group ${{ vars.DEV_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          sleep 15
          curl -f "https://${APP_URL}/health" || exit 1

  # ── Promote to Prod (on release tag) ──────────────────────────
  promote-prod:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ vars.ACR_NAME }}

      - uses: docker/setup-buildx-action@v3

      - name: Retag image (no rebuild)
        run: |
          SHA=$(git rev-parse --short HEAD)
          docker buildx imagetools create \
            --tag "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}" \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHA}"

      - name: Deploy to Container Apps (prod)
        uses: azure/container-apps-deploy-action@v2
        with:
          imageToDeploy: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
          containerAppName: ca-dvx-prod
          resourceGroup: ${{ vars.PROD_RESOURCE_GROUP }}

      - name: Post-deploy smoke test
        run: |
          APP_URL=$(az containerapp show \
            --name ca-dvx-prod \
            --resource-group ${{ vars.PROD_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          sleep 15
          curl -f "https://${APP_URL}/health" || exit 1
