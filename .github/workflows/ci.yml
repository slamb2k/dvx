name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type check
        run: pnpm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  auto-release:
    name: Auto Release
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.version.outputs.skip == 'false' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for version change
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          if git rev-parse "v${CURRENT}" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version v${CURRENT} already tagged — skipping release"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "New version v${CURRENT} detected — will tag and release"
          fi

      - name: Create and push tag
        if: steps.version.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

  release-binaries:
    name: Release (${{ matrix.target }})
    needs: [auto-release]
    if: needs.auto-release.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            pkg_target: node18-linux-x64
            binary: dvx
          - os: windows-latest
            target: win-x64
            pkg_target: node18-win-x64
            binary: dvx.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.auto-release.outputs.version }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: '18', cache: 'pnpm' }
      - run: pnpm install
      - run: pnpm build
      - name: Build binary
        shell: bash
        run: |
          npx @yao-pkg/pkg dist/index.js \
            --target ${{ matrix.pkg_target }} \
            --output dvx \
            --public-packages '*'
      - name: Package with native addon
        shell: bash
        run: |
          ADDON=$(find node_modules -path '*/better-sqlite3/build/Release/better_sqlite3.node' | head -1)
          cp "$ADDON" better_sqlite3.node
          if command -v zip >/dev/null 2>&1; then
            zip dvx-${{ matrix.target }}.zip ${{ matrix.binary }} better_sqlite3.node
          else
            7z a dvx-${{ matrix.target }}.zip ${{ matrix.binary }} better_sqlite3.node
          fi
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum dvx-${{ matrix.target }}.zip | cut -d' ' -f1 > dvx-${{ matrix.target }}.zip.sha256
          else
            shasum -a 256 dvx-${{ matrix.target }}.zip | cut -d' ' -f1 > dvx-${{ matrix.target }}.zip.sha256
          fi
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.auto-release.outputs.version }}
          files: |
            dvx-${{ matrix.target }}.zip
            dvx-${{ matrix.target }}.zip.sha256

  publish-npm:
    name: Publish to npm
    needs: [auto-release, release-binaries]
    if: needs.auto-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.auto-release.outputs.version }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install
      - run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
